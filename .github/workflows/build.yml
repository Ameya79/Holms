name: Build Holms

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pywebview pillow
      - name: Build
        run: pyinstaller holms.spec
      - name: Zip .app
        run: cd dist && zip -r Holms-mac.zip Holms.app
      - uses: actions/upload-artifact@v4
        with:
          name: holms-mac
          path: dist/Holms-mac.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pywebview pillow
      - name: Build
        run: pyinstaller holms.spec
      - uses: actions/upload-artifact@v4
        with:
          name: holms-windows
          path: dist/Holms.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            holms-mac/Holms-mac.zip
            holms-windows/Holms.exe
          generate_release_notes: true
