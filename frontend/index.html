<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holms — Local Document Search</title>
    <meta name="description" content="Search your local personal documents. Works without an API key. Privacy first, single-tenant.">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1F4E4A">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="app">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="brand">
                <svg class="brand-logo" viewBox="0 0 40 40" width="28" height="28">
                    <ellipse cx="20" cy="34" rx="18" ry="4" fill="#EDE3D0"/>
                    <path d="M12 28 L20 18 L28 28 Z" fill="#1F4E4A"/>
                    <rect x="18" y="22" width="4" height="6" fill="#8A6D53"/>
                </svg>
                <h1 class="brand-name">Holms</h1>
            </div>

            <div class="top-actions">
                <span id="docs-count-pill" class="docs-count-pill">0 indexed docs</span>
                <button id="install-btn" class="btn-top install-btn" style="display:none">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Install App
                </button>
                <button id="open-settings-btn" class="btn-icon-top" title="Settings">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                </button>
            </div>
        </header>

        <!-- Main Search & Results Body -->
        <main class="main-body">
            <!-- Search Container (Centered on load, slides up on search) -->
            <section id="search-section" class="search-section centered">
                <h2 id="search-prompt" class="search-prompt">What do you need?</h2>
                <div class="search-box">
                    <input type="text" id="query-input" placeholder="Search your local documents..." autocomplete="off">
                    <button id="search-btn" class="search-btn">
                        <span>Search</span>
                    </button>
                </div>
            </section>

            <!-- Results View Area -->
            <section id="results-section" class="results-section" style="display:none">
                <!-- Status bar -->
                <div id="results-status" class="results-status"></div>

                <!-- Document Results Grid -->
                <div id="documents-grid" class="documents-grid"></div>

                <!-- Optional AI Answer Card (rendered below document cards) -->
                <div id="ai-answer-card" class="ai-answer-card" style="display:none">
                    <div class="ai-card-header">
                        <span class="ai-badge">AI Answer</span>
                    </div>
                    <div id="ai-answer-body" class="ai-answer-body"></div>
                </div>
            </section>
        </main>

        <!-- Bottom Upload & Indexed Files Bar (Always Visible) -->
        <footer class="bottom-bar">
            <div id="drop-zone" class="drop-zone">
                <input type="file" id="file-input" multiple accept=".pdf,.docx,.png,.jpg,.jpeg,.txt,.md" hidden>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <span>Upload files / Drop documents here</span>
            </div>
            <div id="indexed-pills" class="indexed-pills"></div>
        </footer>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal-backdrop" style="display:none">
            <div class="modal-card">
                <div class="modal-header">
                    <h2>Settings</h2>
                    <button id="close-settings-btn" class="btn-close">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="setting-group">
                        <label for="provider-select">AI Provider</label>
                        <p class="setting-hint">Optional — Holms works without an API key. Adding one turns search results into written answers.</p>
                        <select id="provider-select">
                            <option value="anthropic">Anthropic (Claude)</option>
                            <option value="openai">OpenAI (GPT)</option>
                            <option value="gemini">Google (Gemini)</option>
                            <option value="groq">Groq (Llama)</option>
                        </select>
                    </div>

                    <div class="setting-group">
                        <label for="api-key-input">API Key</label>
                        <div class="key-input-row">
                            <input type="password" id="api-key-input" placeholder="Paste your API key...">
                            <button id="toggle-key-btn" class="btn-icon" title="Show/hide key">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="setting-actions">
                        <button id="save-settings-btn" class="btn-primary">Save Settings</button>
                        <button id="test-connection-btn" class="btn-secondary">Test Connection</button>
                    </div>

                    <div id="settings-status" class="settings-status"></div>

                    <div class="setting-group">
                        <label for="api-url-input">Backend URL</label>
                        <p class="setting-hint">Configure your local backend server address.</p>
                        <input type="text" id="api-url-input" placeholder="http://localhost:8000">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/sw.js");
        }
    </script>
</body>
</html>
